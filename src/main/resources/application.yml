server:
  port: ${PORT:8080}

course:
  release:
    runtime-mode: ${COURSE_RUNTIME_MODE:retrieval-only}
  security:
    principals:
      - token: ${COURSE_ALEX_TOKEN:course-alex-local-token}
        user-id: customer-alex
        tenant-id: tenant-blue
        session-id: course-session-alex
        scopes: [support:read, support:write]
        roles: [CUSTOMER]
      - token: ${COURSE_RILEY_TOKEN:course-riley-local-token}
        user-id: customer-riley
        tenant-id: tenant-red
        session-id: course-session-riley
        scopes: [support:read, support:write]
        roles: [CUSTOMER]

spring:
  application:
    name: ai-fabric-course-support-assistant
  datasource:
    url: jdbc:h2:mem:course_support;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

ai:
  enabled: true
  curated:
    pack: support
  prompts:
    bundle:
      overlays:
        - v1-course-support
        - v1-support
  indexing:
    enabled: false
  config:
    default-file: ai-entity-config.yml
  service:
    features:
      enable-generation: false
      enable-embeddings: true
      enable-search: true
      enable-rag: true
  infrastructure:
    rag:
      enabled: true
      default-limit: 5
      default-threshold: 0.55
      enable-hybrid-search: false
      enable-contextual-search: false
  pii-detection:
    enabled: true
    mode: REDACT
    detection-direction: INPUT_OUTPUT
    expose-original-payload-in-result: false
    store-encrypted-original: false
  chat:
    enabled: true
    auto-create-sessions: true
    window-size: 8
    max-context-chars: 4000
    pinned-target-reuse-window-turns: 3
    max-pending-action-stack-depth: 4
  orchestration:
    action-param-provenance-mode: WARN
    default-mode: support_assistant
    strict-mode-routing: true
    modes:
      support_assistant:
        actions-enabled: true
        actions-preferred: true
        retrieval-enabled: true
        information-mode: DETERMINISTIC_RAG_GENERATE
        suggestions-enabled: false
        rag:
          fanout-enabled: false
          top-k-per-space: 5
          similarity-threshold: 0.55
          max-documents-returned-to-client: 5
          max-documents-used-for-context: 5
          max-context-chars: 4000
          retrieval-vector-spaces-allowlist:
            - knowledge-article

management:
  info:
    build:
      enabled: true
    git:
      enabled: true
      mode: full
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    dev.aifabric.course.support: INFO
