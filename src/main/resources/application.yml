server:
  port: ${PORT:8080}

spring:
  application:
    name: ai-fabric-course-support-assistant
  datasource:
    url: jdbc:h2:mem:course_support;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

ai:
  enabled: true
  indexing:
    enabled: false
  config:
    default-file: ai-entity-config.yml
  service:
    features:
      enable-generation: false
      enable-embeddings: true
      enable-search: true
      enable-rag: true
  infrastructure:
    rag:
      enabled: true
      default-limit: 5
      default-threshold: 0.55
      enable-hybrid-search: false
      enable-contextual-search: false
  pii-detection:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    dev.aifabric.course.support: INFO
