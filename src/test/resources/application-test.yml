ai:
  intent-extraction:
    progressive:
      enabled: false
  providers:
    llm-provider: course-test
    embedding-provider: course-test
    enable-fallback: false
  vector-db:
    type: memory
  service:
    features:
      enable-generation: true
      enable-embeddings: true
      enable-search: true
      enable-rag: true

course:
  release:
    runtime-mode: deterministic-test
