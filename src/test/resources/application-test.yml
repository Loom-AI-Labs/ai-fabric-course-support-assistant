ai:
  intent-extraction:
    progressive:
      enabled: false
  providers:
    llm-provider: course-generation-test
    embedding-provider: course-test
    enable-fallback: false
    orchestration:
      llm-provider: course-orchestration-test
      model: course-test-orchestration
      temperature: 0.0
      max-tokens: 200
    generation:
      llm-provider: course-generation-test
      model: course-test-generation
      temperature: 0.2
      max-tokens: 600
  vector-db:
    type: memory
  service:
    features:
      enable-generation: true
      enable-embeddings: true
      enable-search: true
      enable-rag: true

course:
  release:
    runtime-mode: deterministic-test
