name: Verify Course Application

on:
  push:
    branches: [main]
    tags: ['course-*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clean-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify the standalone learner application
        run: ./mvnw --batch-mode --no-transfer-progress clean verify
