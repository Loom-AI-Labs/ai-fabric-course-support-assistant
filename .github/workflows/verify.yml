name: Verify Course Application

on:
  push:
    branches: [main]
    tags: ['course-*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clean-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify the standalone learner application
        run: ./mvnw --batch-mode --no-transfer-progress clean verify
      - name: Cache the course ONNX model
        uses: actions/cache@v4
        with:
          path: models/embeddings
          key: ai-fabric-course-all-MiniLM-L6-v2-v1
      - name: Download the course ONNX model
        run: |
          if [[ ! -s models/embeddings/all-MiniLM-L6-v2.onnx || ! -s models/embeddings/tokenizer.json ]]; then
            ./scripts/download-onnx-model.sh
          fi
      - name: Smoke the packaged application
        env:
          COURSE_SMOKE_USE_EXISTING_JAR: 'true'
        run: ./scripts/smoke-packaged.sh
      - name: Smoke the local Qdrant profile
        env:
          COURSE_SMOKE_USE_EXISTING_JAR: 'true'
          COURSE_QDRANT_IMAGE: qdrant/qdrant:v1.16.1
        run: ./scripts/smoke-qdrant.sh
      - name: Retain deterministic and packaged-runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: course-release-evidence-${{ github.sha }}
          if-no-files-found: warn
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/course-release-evidence/

  release-container:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Prove source-labelled container, restart, retention, and missing-key behavior
        run: ./scripts/smoke-release.sh
      - name: Record optional OpenAI posture without borrowing keyless success
        run: ./scripts/smoke-openai-optional.sh
      - name: Retain release-container evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: course-release-container-evidence-${{ github.sha }}
          if-no-files-found: warn
          path: target/course-release-evidence/
